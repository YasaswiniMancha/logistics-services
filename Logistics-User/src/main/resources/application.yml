server:
  port: 8400
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/logistics-management
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost=9092
    consumer:
      group-id: logistics-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      acks: all
    properties:
      spring:
        json:
          add:
            type:
              headers: false
    admin:
      auto-create: false
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: YOUR_CLIENT_ID
            client-secret: secretkey1
jwt:
  secret: mySecretKeyForJwtAuthentication123456
  access-token-expiration: 3600000
  refresh-token-expiration: 86400000
app:
  kafka:
    topic:
      user-created: user-created-topic
logging:
  level:
    org:
      springframework:
        kafka: INFO
      apache:
        kafka: WARN
